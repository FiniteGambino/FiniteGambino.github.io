<style>
  :root {
    --navy:    #0f2d4a;
    --blue:    #1a5c8a;
    --mid:     #2d88c0;
    --light:   #e8f3fb;
    --accent:  #d4a853;
    --green:   #2a7a4b;
    --green-bg:#edf7f1;
    --row-alt: #f7fbff;
    --border:  #b8d4ea;
    --text:    #1a2535;
    --muted:   #6b7f95;
    --white:   #ffffff;
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
width: 100%;
margin: 0;
padding: 0;
}

body {
font-family: ‘DM Sans’, sans-serif;
background: #f0f5fa;
color: var(–text);
min-height: 100vh;
}

/* ── STICKY HEADER ── */
.sticky-header {
position: sticky;
top: 0;
z-index: 100;
background: var(–navy);
padding: 0;
box-shadow: 0 4px 20px rgba(15,45,74,0.35);
width: 100%;
}

.header-inner {
max-width: 1100px;
margin: 0 auto;
padding: 18px 32px;
display: flex;
align-items: center;
justify-content: space-between;
gap: 24px;
}

.header-title h1 {
font-family: ‘DM Serif Display’, serif;
font-size: 1.35rem;
color: var(–white);
letter-spacing: 0.02em;
}

.header-title p {
font-size: 0.78rem;
color: #8ab4d0;
margin-top: 2px;
font-weight: 300;
}

.progress-block {
display: flex;
align-items: center;
gap: 20px;
flex-shrink: 0;
}

.counter-pill {
background: rgba(255,255,255,0.08);
border: 1px solid rgba(255,255,255,0.15);
border-radius: 40px;
padding: 8px 20px;
display: flex;
align-items: baseline;
gap: 6px;
}

.counter-done {
font-family: ‘DM Serif Display’, serif;
font-size: 2rem;
color: var(–accent);
line-height: 1;
transition: all 0.2s;
}

.counter-sep {
font-size: 1.1rem;
color: rgba(255,255,255,0.3);
}

.counter-total {
font-size: 1.1rem;
color: rgba(255,255,255,0.55);
font-weight: 300;
}

.counter-label {
font-size: 0.72rem;
color: #8ab4d0;
text-transform: uppercase;
letter-spacing: 0.1em;
font-weight: 500;
}

.progress-bar-wrap {
width: 180px;
}

.progress-bar-track {
height: 6px;
background: rgba(255,255,255,0.12);
border-radius: 3px;
overflow: hidden;
}

.progress-bar-fill {
height: 100%;
background: linear-gradient(90deg, var(–mid), var(–accent));
border-radius: 3px;
width: 0%;
transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
}

.progress-pct {
font-size: 0.75rem;
color: #8ab4d0;
margin-top: 5px;
text-align: right;
font-weight: 500;
}

/* ── MAIN CONTENT ── */
.container {
max-width: 1100px;
margin: 0 auto;
padding: 40px 32px 80px;
}

/* ── MODULE SECTION ── */
.module {
margin-bottom: 48px;
}

.module-heading {
font-family: ‘DM Serif Display’, serif;
font-size: 1.5rem;
color: var(–navy);
margin-bottom: 20px;
padding-bottom: 10px;
border-bottom: 3px solid var(–mid);
display: flex;
align-items: center;
gap: 12px;
}

.module-heading span.mod-tag {
font-size: 0.7rem;
font-family: ‘DM Sans’, sans-serif;
font-weight: 600;
letter-spacing: 0.12em;
text-transform: uppercase;
color: white;
padding: 3px 10px;
border-radius: 3px;
flex-shrink: 0;
}

/* ── CHAPTER TABLE ── */
.chapter-block {
margin-bottom: 24px;
border-radius: 8px;
overflow: hidden;
box-shadow: 0 2px 12px rgba(15,45,74,0.1);
}

.chapter-header {
display: grid;
grid-template-columns: 52px 1fr 160px 140px 80px;
background: var(–blue);
color: white;
font-size: 0.8rem;
font-weight: 600;
letter-spacing: 0.06em;
text-transform: uppercase;
}

.chapter-header .col {
padding: 11px 14px;
border-right: 1px solid rgba(255,255,255,0.15);
}

.chapter-header .col:last-child { border-right: none; }
.chapter-header .col.center { text-align: center; }
.chapter-header .col.ch-name { font-family: ‘DM Serif Display’, serif; font-size: 0.95rem; text-transform: none; letter-spacing: 0; }

.obj-row {
display: grid;
grid-template-columns: 52px 1fr 160px 140px 80px;
border-top: 1px solid var(–border);
transition: background 0.15s;
}

.obj-row:nth-child(even) { background: var(–row-alt); }
.obj-row:nth-child(odd)  { background: var(–white); }
.obj-row:hover           { background: #deeef9; }
.obj-row.completed       { background: var(–green-bg) !important; }
.obj-row.completed .obj-text { color: var(–muted); }

.obj-row .col {
padding: 10px 14px;
font-size: 0.88rem;
border-right: 1px solid var(–border);
display: flex;
align-items: center;
}

.obj-row .col:last-child { border-right: none; }

.col-num {
justify-content: center;
font-weight: 600;
color: var(–blue);
font-size: 0.82rem;
background: var(–light) !important;
flex-shrink: 0;
}

.obj-row.completed .col-num {
background: #c8ead8 !important;
color: var(–green);
}

.obj-text { line-height: 1.5; color: var(–text); }

.col-date input[type=“date”],
.col-date input[type=“text”] {
border: 1px solid var(–border);
border-radius: 4px;
padding: 4px 8px;
font-size: 0.82rem;
font-family: ‘DM Sans’, sans-serif;
color: var(–text);
background: white;
width: 100%;
cursor: pointer;
}

.col-date input:focus {
outline: none;
border-color: var(–mid);
box-shadow: 0 0 0 2px rgba(45,136,192,0.2);
}

.col-check {
justify-content: center;
}

/* Custom checkbox */
.check-wrap {
position: relative;
width: 26px;
height: 26px;
cursor: pointer;
}

.check-wrap input[type=“checkbox”] {
position: absolute;
opacity: 0;
width: 100%;
height: 100%;
cursor: pointer;
margin: 0;
}

.check-box {
width: 26px;
height: 26px;
border: 2px solid var(–border);
border-radius: 5px;
background: white;
display: flex;
align-items: center;
justify-content: center;
transition: all 0.15s;
pointer-events: none;
}

.check-wrap input:checked ~ .check-box {
background: var(–green);
border-color: var(–green);
}

.check-wrap input:checked ~ .check-box::after {
content: ‘’;
display: block;
width: 6px;
height: 11px;
border: 2px solid white;
border-top: none;
border-left: none;
transform: rotate(45deg) translate(-1px, -1px);
}

.check-wrap:hover .check-box {
border-color: var(–mid);
box-shadow: 0 0 0 3px rgba(45,136,192,0.15);
}

/* ── MODULE COLOUR THEMES ── */
/* pill (span.mod-tag) = lighter, chapter-header = darker */

.module-1  .module-heading span.mod-tag { background: #3892cc; }
.module-1  .module-heading              { border-color: #67ccff; }
.module-1  .chapter-header              { background: #3892cc; }

.module-2  .module-heading span.mod-tag { background: #29a575; }
.module-2  .module-heading              { border-color: #4eefad; }
.module-2  .chapter-header              { background: #29a575; }

.module-3  .module-heading span.mod-tag { background: #9464cc; }
.module-3  .module-heading              { border-color: #dca2ff; }
.module-3  .chapter-header              { background: #9464cc; }

.module-4  .module-heading span.mod-tag { background: #e05f13; }
.module-4  .module-heading              { border-color: #ff923a; }
.module-4  .chapter-header              { background: #e05f13; }

.module-5  .module-heading span.mod-tag { background: #ea4e4e; }
.module-5  .module-heading              { border-color: #ff8e88; }
.module-5  .chapter-header              { background: #ea4e4e; }

.module-6  .module-heading span.mod-tag { background: #81c027; }
.module-6  .module-heading              { border-color: #ccff4e; }
.module-6  .chapter-header              { background: #81c027; }

.module-7  .module-heading span.mod-tag { background: #cf407e; }
.module-7  .module-heading              { border-color: #ff73b7; }
.module-7  .chapter-header              { background: #cf407e; }

.module-8  .module-heading span.mod-tag { background: #30af9c; }
.module-8  .module-heading              { border-color: #5ffce0; }
.module-8  .chapter-header              { background: #30af9c; }

.module-9  .module-heading span.mod-tag { background: #6d70d6; }
.module-9  .module-heading              { border-color: #afb2ff; }
.module-9  .chapter-header              { background: #6d70d6; }

.module-10 .module-heading span.mod-tag { background: #cf4e75; }
.module-10 .module-heading              { border-color: #ff86a5; }
.module-10 .chapter-header              { background: #cf4e75; }

.module-11 .module-heading span.mod-tag { background: #18afcc; }
.module-11 .module-heading              { border-color: #30f4ff; }
.module-11 .chapter-header              { background: #18afcc; }

/* ── PRINT ── */
@media print {
.sticky-header { position: relative; }
.progress-bar-wrap { display: none; }
body { background: white; }
.container { padding: 20px; }
.check-box { border: 1px solid #999; }
}

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
.header-inner {
flex-direction: column;
align-items: flex-start;
gap: 10px;
padding: 14px 16px;
}
.header-title h1 { font-size: 1.1rem; }
.progress-bar-wrap { width: 100%; }
.progress-block { width: 100%; flex-direction: row; align-items: center; gap: 12px; }

.obj-row .col-date-input {
  grid-column: 1 / 2;
  grid-row: 2;
  padding: 6px 8px;
  background: rgba(0,0,0,0.02);
  border-top: 1px solid var(--border);
}

  grid-column: 2 / -1;
  grid-row: 2;
  padding: 6px 8px;
  background: rgba(0,0,0,0.02);
  border-top: 1px solid var(--border);
}
.obj-row .col-date input[type="date"],
.obj-row .col-date input[type="text"] {

  font-size: 0.75rem;

// ── BUILD DOM ──
const container = document.getElementById('mainContent');
let globalNum = 1;
let totalCount = 0;
modules.forEach(m => m.chapters.forEach(c => totalCount += c.objectives.length));
document.getElementById('totalCount').textContent = totalCount;

modules.forEach((mod, mi) => {
  const modDiv = document.createElement('div');
  modDiv.className = 'module module-' + (mi + 1);

  const parts = mod.title.split(' | ');
  const h2 = document.createElement('h2');
  h2.className = 'module-heading';
  h2.innerHTML = `<span class="mod-tag">${parts[0]}</span>${parts[1] || ''}`;
  modDiv.appendChild(h2);

  mod.chapters.forEach((ch, ci) => {
    const block = document.createElement('div');
    block.className = 'chapter-block';

    // Header row
    const header = document.createElement('div');
    header.className = 'chapter-header';
    header.innerHTML = `
      <div class="col center">#</div>
      <div class="col ch-name">${ch.name}</div>
      <div class="col center">Target Date</div>
      <div class="col center">Notes</div>
      <div class="col center">Done</div>
    `;
    block.appendChild(header);

    ch.objectives.forEach((obj, oi) => {
      const num = globalNum++;
      const row = document.createElement('div');
      row.className = 'obj-row';
      row.dataset.id = num;

      row.innerHTML = `
        <div class="col col-num">${num}</div>
        <div class="col obj-text">${obj}</div>
        <div class="col col-date col-date-input"><input type="date" title="Target completion date" /></div>
        <div class="col col-date col-notes-input"><input type="text" placeholder="Notes..." style="font-size:0.78rem;" /></div>
        <div class="col col-check">
          <label class="check-wrap">
            <input type="checkbox" />
            <div class="check-box"></div>
          </label>
        </div>
      `;

      const cb = row.querySelector('input[type="checkbox"]');
      cb.addEventListener('change', () => {
        row.classList.toggle('completed', cb.checked);
        updateCounter();
        saveState();
      });

      // Save date/notes on change
      row.querySelectorAll('input[type="date"], input[type="text"]').forEach(inp => {
        inp.addEventListener('change', saveState);
      });

      block.appendChild(row);
    });

    modDiv.appendChild(block);
  });

  container.appendChild(modDiv);
});

// ── COUNTER ──
function updateCounter() {
  const done = document.querySelectorAll('input[type="checkbox"]:checked').length;
  document.getElementById('doneCount').textContent = done;
  const pct = Math.round((done / totalCount) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
}

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDB__2dOB581BAOtn03835mlaHpKckAQU8",
  authDomain: "ap-planner-1f7df.firebaseapp.com",
  databaseURL: "https://ap-planner-1f7df-default-rtdb.firebaseio.com",
  projectId: "ap-planner-1f7df",
  storageBucket: "ap-planner-1f7df.firebasestorage.app",
  messagingSenderId: "1098701382105",
  appId: "1:1098701382105:web:6708be48a4e9c5e5c0f9c8"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const STATE_REF = ref(db, 'para1101/state');

let isSyncing = false;

function saveState() {
  const state = {};
  document.querySelectorAll('.obj-row').forEach(row => {
    const id = row.dataset.id;
    const cb = row.querySelector('input[type="checkbox"]');
    const dateInp = row.querySelector('input[type="date"]');
    const noteInp = row.querySelector('input[type="text"]');
    state[id] = {
      done: cb.checked,
      date: dateInp ? dateInp.value : '',
      note: noteInp ? noteInp.value : ''
    };
  });
  // Save to localStorage as backup
  try { localStorage.setItem('para1101_state', JSON.stringify(state)); } catch(e) {}
  // Save to Firebase
  set(STATE_REF, state).catch(err => console.error('Firebase save error:', err));
}

function applyState(state) {
  if (!state) return;
  isSyncing = true;
  document.querySelectorAll('.obj-row').forEach(row => {
    const id = row.dataset.id;
    if (!state[id]) return;
    const cb = row.querySelector('input[type="checkbox"]');
    const dateInp = row.querySelector('input[type="date"]');
    const noteInp = row.querySelector('input[type="text"]');
    if (state[id].done) { cb.checked = true; row.classList.add('completed'); }
    else { cb.checked = false; row.classList.remove('completed'); }
    if (dateInp && state[id].date) dateInp.value = state[id].date;
    if (noteInp && state[id].note) noteInp.value = state[id].note;
  });
  updateCounter();
  isSyncing = false;
}

// Listen for real-time changes from Firebase
onValue(STATE_REF, (snapshot) => {
  if (!isSyncing) {
    applyState(snapshot.val());
  }
});

// Fallback: load from localStorage while Firebase connects
(function loadLocalFallback() {
  let state;
  try { state = JSON.parse(localStorage.getItem('para1101_state') || 'null'); } catch(e) {}
  if (state) applyState(state);
})();
</script>
